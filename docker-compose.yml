version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kara_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kara_taskdb
    volumes:
      - kara_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kara_taskdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: kara_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/kara_taskdb
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      FLASK_ENV: production
    ports:
      - "8888:8888"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: kara_frontend
    restart: always
    environment:
      BACKEND_URL: http://backend:8888
    ports:
      - "8889:8889"
    depends_on:
      - backend

volumes:
  kara_pgdata:
